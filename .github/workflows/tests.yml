name: Reproduce and test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install -e '.[dev]'
      - name: Run clean tests
        run: pytest -q
      - name: Reproduce paper outputs
        run: python scripts/reproduce_results.py
      - name: Check reproduced artifacts are current
        run: git diff --exit-code -- results/reproduced
      - name: Verify original frozen files
        run: python provenance/verify_snapshot.py
